<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theralink — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F0F4F8;
  --surface: #FFFFFF;
  --border: #DDE3EA;
  --text: #1A2332;
  --muted: #6B7A8D;
  --accent: #4A7C6F;
  --accent-light: #E8F2F0;
  --danger: #D94F4F;
  --r: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

body {
  font-family: 'Instrument Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 440px;
  padding: 24px;
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo h1 {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.logo p {
  color: var(--muted);
  font-size: 0.9rem;
  margin-top: 4px;
}

.card {
  background: var(--surface);
  border-radius: var(--r);
  padding: 36px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.tabs {
  display: flex;
  gap: 4px;
  background: var(--bg);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 28px;
}

.tab {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--muted);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.tab.active {
  background: var(--surface);
  color: var(--text);
  font-weight: 600;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}

.form { display: none; flex-direction: column; gap: 16px; }
.form.active { display: flex; }

label {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: block;
  margin-bottom: 6px;
}

input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.95rem;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.2s;
}

input:focus { border-color: var(--accent); background: #fff; }

.btn {
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  margin-top: 4px;
}

.btn:hover { opacity: 0.9; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: #fff;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 0.9rem;
  font-weight: 500;
  transition: transform 0.3s;
  z-index: 999;
}

.toast.show { transform: translateX(-50%) translateY(0); }
.toast.erro { background: var(--danger); }
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <h1>Theralink</h1>
    <p>Plataforma para psicólogos</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="trocarTab('login')">Entrar</button>
      <button class="tab" onclick="trocarTab('registro')">Criar conta</button>
    </div>

    <!-- Login -->
    <form class="form active" id="form-login" onsubmit="login(event)">
      <div>
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" required>
      </div>
      <div>
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="••••••••" required>
      </div>
      <button class="btn" type="submit" id="btn-login">Entrar</button>
    </form>

    <!-- Registro -->
    <form class="form" id="form-registro" onsubmit="registro(event)">
      <div>
        <label>Nome completo</label>
        <input type="text" id="reg-nome" placeholder="Dra. Ana Silva" required>
      </div>
      <div>
        <label>E-mail</label>
        <input type="email" id="reg-email" placeholder="seu@email.com" required>
      </div>
      <div>
        <label>CRP</label>
        <input type="text" id="reg-crp" placeholder="06/123456">
      </div>
      <div>
        <label>Senha</label>
        <input type="password" id="reg-senha" placeholder="Mínimo 6 caracteres" required>
      </div>
      <button class="btn" type="submit" id="btn-registro">Criar conta</button>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://theralink-production.up.railway.app/api';

function trocarTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'registro'));
  });
  document.getElementById('form-login').classList.toggle('active', tab === 'login');
  document.getElementById('form-registro').classList.toggle('active', tab === 'registro');
}

function toast(msg, erro = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (erro ? ' erro' : '');
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('login-email').value,
        senha: document.getElementById('login-senha').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.erro);
    localStorage.setItem('token', data.token);
    localStorage.setItem('psicologo', JSON.stringify(data.psicologo));
    window.location.href = 'dashboard.html';
  } catch (err) {
    toast(err.message, true);
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

async function registro(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-registro');
  btn.disabled = true;
  btn.textContent = 'Criando conta...';
  try {
    const res = await fetch(`${API}/auth/registro`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nome: document.getElementById('reg-nome').value,
        email: document.getElementById('reg-email').value,
        crp: document.getElementById('reg-crp').value,
        senha: document.getElementById('reg-senha').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.erro);
    toast('Conta criada! Faça login.');
    trocarTab('login');
  } catch (err) {
    toast(err.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Criar conta';
  }
}

// Redireciona se já logado
if (localStorage.getItem('token')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
